<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenz — Desarrollo web digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0E1A;
    --surface: #121829;
    --surface-2: #1A2236;
    --line: #232C45;
    --text: #E8ECF5;
    --text-muted: #8C99B8;
    --cyan: #10B981;
    --mint: #5EEAD4;
    --radius: 14px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html{scroll-behavior:smooth;}

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  h1,h2,h3,h4{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    letter-spacing:-0.01em;
    line-height:1.15;
    color:var(--text);
  }

  .mono{font-family:'JetBrains Mono',monospace;}

  .container{
    max-width:1140px;
    margin:0 auto;
    padding:0 24px;
    position:relative;
    z-index:2;
  }

  a{color:inherit;text-decoration:none;}

  /* ===== NAV ===== */
  nav{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(10,14,26,0.78);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 24px;
  }
  .logo{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:1.3rem;
    display:flex;
    align-items:center;
    gap:10px;
    letter-spacing:0.02em;
    color:var(--text);
  }
  .logo .node{
    width:24px;height:24px;
    flex-shrink:0;
  }
  .logo .node svg{display:block;width:100%;height:100%;}
  .nav-links{
    display:flex;
    gap:32px;
    font-size:0.9rem;
    color:var(--text-muted);
  }
  .nav-links a:hover{color:var(--text);}
  .nav-cta{
    font-size:0.85rem;
    font-weight:600;
    background:var(--cyan);
    color:#04293E;
    padding:11px 22px;
    border-radius:999px;
    font-family:'Inter',sans-serif;
  }
  @media (max-width:768px){
    .nav-links{display:none;}
  }

  /* ===== HERO con red de nodos ===== */
  .hero{
    padding:110px 0 90px;
    position:relative;
    overflow:hidden;
  }
  #network-canvas{
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
    z-index:0;
    opacity:0.85;
  }
  .hero::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, transparent 0%, var(--bg) 95%);
    z-index:1;
    pointer-events:none;
  }
  .hero-content{
    text-align:center;
    max-width:760px;
    margin:0 auto;
    position:relative;
    z-index:2;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:10px;
    border:1px solid var(--line);
    background:rgba(18,24,41,0.7);
    color:var(--cyan);
    font-family:'JetBrains Mono',monospace;
    font-weight:500;
    font-size:0.8rem;
    padding:8px 20px;
    border-radius:999px;
    margin-bottom:28px;
    letter-spacing:0.05em;
  }
  .eyebrow::before{
    content:'';
    width:8px;height:8px;
    border-radius:50%;
    background:var(--cyan);
    display:inline-block;
    box-shadow:0 0 10px var(--cyan);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.35;}
  }
  .hero h1{
    font-size:clamp(2.6rem, 6vw, 4.2rem);
    margin-bottom:28px;
  }
  .hero h1 span{
    color:var(--cyan);
    text-shadow:0 0 28px rgba(16,185,129,0.5);
  }
  .hero p{
    font-size:1.12rem;
    color:var(--text-muted);
    max-width:520px;
    margin:0 auto 40px;
  }
  .hero-actions{
    display:flex;
    gap:16px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .btn-primary{
    background:var(--cyan);
    color:#04293E;
    font-weight:600;
    padding:16px 32px;
    border-radius:10px;
    font-size:0.95rem;
    border:none;
    cursor:pointer;
    transition:transform 0.2s ease, box-shadow 0.2s ease;
  }
  .btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 32px -10px rgba(16,185,129,0.55);
  }
  .btn-secondary{
    border:1px solid var(--line);
    color:var(--text);
    font-weight:500;
    padding:16px 32px;
    border-radius:10px;
    font-size:0.95rem;
    background:rgba(18,24,41,0.5);
    transition:border-color 0.2s ease, background 0.2s ease;
  }
  .btn-secondary:hover{
    border-color:var(--cyan);
    background:var(--surface);
  }

  /* ===== SECTION HEADERS ===== */
  .section{
    padding:80px 0;
    border-top:1px solid var(--line);
    position:relative;
  }
  .section-head{
    max-width:560px;
    margin-bottom:50px;
  }
  .section-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:0.78rem;
    color:var(--cyan);
    letter-spacing:0.08em;
    margin-bottom:12px;
  }
  .section-head h2{
    font-size:clamp(1.8rem, 3.5vw, 2.4rem);
    margin-bottom:14px;
  }
  .section-head p{
    color:var(--text-muted);
    font-size:1.02rem;
  }

  /* ===== SERVICIOS ===== */
  .services{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:24px;
  }
  @media (max-width:900px){
    .services{grid-template-columns:1fr;}
  }
  .service-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:32px;
    transition:border-color 0.2s ease, transform 0.2s ease;
    position:relative;
    overflow:hidden;
  }
  .service-card:hover{
    border-color:var(--cyan);
    transform:translateY(-4px);
  }
  .service-card::before{
    content:'';
    position:absolute;
    top:-1px;left:-1px;
    width:60px;height:60px;
    background:radial-gradient(circle at top left, rgba(16,185,129,0.22), transparent 70%);
    pointer-events:none;
  }
  .service-icon{
    width:46px;height:46px;
    border-radius:10px;
    background:var(--surface-2);
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:20px;
    font-family:'JetBrains Mono',monospace;
    font-size:1.1rem;
    color:var(--cyan);
    position:relative;
    z-index:1;
  }
  .service-card h3{
    font-size:1.2rem;
    margin-bottom:10px;
    position:relative;
    z-index:1;
  }
  .service-card p{
    color:var(--text-muted);
    font-size:0.94rem;
    position:relative;
    z-index:1;
  }
  .service-meta{
    margin-top:18px;
    padding-top:18px;
    border-top:1px solid var(--line);
    font-family:'JetBrains Mono',monospace;
    font-size:0.78rem;
    color:var(--text-muted);
    display:flex;
    justify-content:space-between;
    position:relative;
    z-index:1;
  }

  /* ===== PROCESO ===== */
  .process{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:0;
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    background:var(--surface);
  }
  @media (max-width:900px){
    .process{grid-template-columns:1fr;}
  }
  .process-step{
    padding:32px 28px;
    border-right:1px solid var(--line);
    position:relative;
  }
  .process-step:last-child{border-right:none;}
  @media (max-width:900px){
    .process-step{border-right:none;border-bottom:1px solid var(--line);}
    .process-step:last-child{border-bottom:none;}
  }
  .process-num{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.85rem;
    color:var(--cyan);
    margin-bottom:16px;
  }
  .process-num .pdot{
    width:7px;height:7px;
    border-radius:50%;
    background:var(--cyan);
    display:inline-block;
    box-shadow:0 0 8px var(--cyan);
  }
  .process-step h3{
    font-size:1.05rem;
    margin-bottom:8px;
  }
  .process-step p{
    color:var(--text-muted);
    font-size:0.9rem;
  }

  /* ===== PRECIOS ===== */
  .pricing{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:24px;
  }
  @media (max-width:900px){
    .pricing{grid-template-columns:1fr;}
  }
  .price-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:32px;
    display:flex;
    flex-direction:column;
  }
  .price-card.featured{
    border-color:var(--cyan);
    background:linear-gradient(180deg, rgba(16,185,129,0.12), var(--surface) 60%);
    position:relative;
    box-shadow:0 0 44px -10px rgba(16,185,129,0.25);
  }
  .price-badge{
    position:absolute;
    top:-12px;
    left:32px;
    background:var(--cyan);
    color:#04293E;
    font-size:0.72rem;
    font-weight:600;
    padding:5px 12px;
    border-radius:999px;
    font-family:'JetBrains Mono',monospace;
  }
  .price-card h3{
    font-size:1.15rem;
    margin-bottom:6px;
  }
  .price-card .price-sub{
    color:var(--text-muted);
    font-size:0.88rem;
    margin-bottom:24px;
  }
  .price-amount{
    font-family:'JetBrains Mono',monospace;
    font-size:2.4rem;
    font-weight:500;
    margin-bottom:4px;
    color:var(--text);
  }
  .price-amount span{
    font-size:1rem;
    color:var(--text-muted);
    font-weight:400;
  }
  .price-period{
    font-size:0.82rem;
    color:var(--text-muted);
    margin-bottom:28px;
  }
  .price-features{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:28px;
    flex-grow:1;
  }
  .price-features li{
    font-size:0.9rem;
    color:var(--text);
    display:flex;
    gap:10px;
    align-items:flex-start;
  }
  .price-features li::before{
    content:'';
    width:6px;height:6px;
    border-radius:50%;
    background:var(--mint);
    margin-top:8px;
    flex-shrink:0;
  }
  .price-cta{
    text-align:center;
    padding:13px;
    border-radius:10px;
    font-weight:600;
    font-size:0.92rem;
    border:1px solid var(--line);
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .price-cta:hover{
    background:var(--surface-2);
    border-color:var(--cyan);
  }
  .price-card.featured .price-cta{
    background:var(--cyan);
    color:#04293E;
    border:none;
  }

  /* ===== FAQ ===== */
  .faq{
    display:flex;
    flex-direction:column;
    gap:1px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .faq-item{
    background:var(--surface);
  }
  .faq-q{
    padding:22px 28px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    font-weight:500;
    font-size:1rem;
    border-bottom:1px solid var(--line);
  }
  .faq-item:last-child .faq-q{border-bottom:none;}
  .faq-item.open .faq-q{border-bottom:1px solid var(--line);}
  .faq-icon{
    font-family:'JetBrains Mono',monospace;
    color:var(--cyan);
    font-size:1.1rem;
    flex-shrink:0;
    transition:transform 0.2s ease;
  }
  .faq-item.open .faq-icon{transform:rotate(45deg);}
  .faq-a{
    padding:0 28px;
    max-height:0;
    overflow:hidden;
    transition:max-height 0.25s ease, padding 0.25s ease;
    color:var(--text-muted);
    font-size:0.92rem;
  }
  .faq-item.open .faq-a{
    max-height:200px;
    padding:0 28px 22px;
  }

  /* ===== CONTACTO ===== */
  .contact{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:50px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:50px;
    align-items:center;
    position:relative;
    overflow:hidden;
  }
  .contact::before{
    content:'';
    position:absolute;
    top:-100px;right:-100px;
    width:240px;height:240px;
    background:radial-gradient(circle, rgba(16,185,129,0.18), transparent 70%);
    pointer-events:none;
  }
  @media (max-width:900px){
    .contact{grid-template-columns:1fr;padding:32px;}
  }
  .contact h2{
    font-size:clamp(1.7rem, 3.5vw, 2.2rem);
    margin-bottom:14px;
  }
  .contact p{
    color:var(--text-muted);
    margin-bottom:24px;
  }
  .contact-form{
    display:flex;
    flex-direction:column;
    gap:14px;
    position:relative;
    z-index:1;
  }
  .contact-form input,
  .contact-form textarea,
  .contact-form select{
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:8px;
    padding:13px 16px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:0.92rem;
    width:100%;
  }
  .contact-form input:focus,
  .contact-form textarea:focus,
  .contact-form select:focus{
    outline:none;
    border-color:var(--cyan);
  }
  .contact-form textarea{
    resize:vertical;
    min-height:90px;
  }
  .contact-form button{
    margin-top:6px;
  }
  .contact-direct{
    margin-top:24px;
    display:flex;
    flex-direction:column;
    gap:10px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.88rem;
    color:var(--mint);
    position:relative;
    z-index:1;
  }

  /* ===== FOOTER ===== */
  footer{
    border-top:1px solid var(--line);
    padding:40px 0;
  }
  .footer-inner{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
    color:var(--text-muted);
    font-size:0.85rem;
  }
</style>
</head>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
    // Si llega un link de invitación/recuperación, abre directo el modal correspondiente
    window.netlifyIdentity.on("init", () => {
      const params = new URLSearchParams(window.location.hash.replace("#", "?"));
      if (params.get("invite_token") || params.get("confirmation_token") || params.get("recovery_token")) {
        window.netlifyIdentity.open();
      }
    });
  }
</script>

<script>
/* ===== Carga de contenido editable desde content.json ===== */
async function loadContent(){
  const res = await fetch('content.json?v=' + Date.now());
  const data = await res.json();

  // Hero
  document.getElementById('hero-eyebrow').textContent = data.hero.eyebrow;
  document.getElementById('hero-title').innerHTML = `${data.hero.title_line1} <span>${data.hero.title_highlight}</span>`;
  document.getElementById('hero-subtitle').textContent = data.hero.subtitle;
  document.getElementById('hero-cta-primary').textContent = data.hero.cta_primary;
  document.getElementById('hero-cta-secondary').textContent = data.hero.cta_secondary;

  // Servicios
  document.getElementById('servicios-tag').textContent = data.servicios.tag;
  document.getElementById('servicios-title').textContent = data.servicios.title;
  document.getElementById('servicios-description').textContent = data.servicios.description;
  const serviciosList = document.getElementById('servicios-list');
  serviciosList.innerHTML = data.servicios.items.map(item => `
    <div class="service-card">
      <div class="service-icon">${item.number}</div>
      <h3>${item.title}</h3>
      <p>${item.description}</p>
      <div class="service-meta">
        <span>${item.delivery}</span>
        <span>${item.scope}</span>
      </div>
    </div>
  `).join('');

  // Proceso
  document.getElementById('proceso-tag').textContent = data.proceso.tag;
  document.getElementById('proceso-title').textContent = data.proceso.title;
  document.getElementById('proceso-description').textContent = data.proceso.description;
  const procesoList = document.getElementById('proceso-list');
  procesoList.innerHTML = data.proceso.items.map(step => `
    <div class="process-step">
      <div class="process-num"><span class="pdot"></span>${step.label}</div>
      <h3>${step.title}</h3>
      <p>${step.description}</p>
    </div>
  `).join('');

  // Precios
  document.getElementById('precios-tag').textContent = data.precios.tag;
  document.getElementById('precios-title').textContent = data.precios.title;
  document.getElementById('precios-description').textContent = data.precios.description;
  const preciosList = document.getElementById('precios-list');
  preciosList.innerHTML = data.precios.items.map(plan => `
    <div class="price-card ${plan.featured ? 'featured' : ''}">
      ${plan.featured && plan.badge ? `<div class="price-badge">${plan.badge}</div>` : ''}
      <h3>${plan.name}</h3>
      <p class="price-sub">${plan.sub}</p>
      <div class="price-amount">${plan.price}<span>/proyecto</span></div>
      <div class="price-period">${plan.period}</div>
      <ul class="price-features">
        ${plan.features.map(f => `<li>${f}</li>`).join('')}
      </ul>
      <a href="#contacto" class="price-cta">${plan.cta}</a>
    </div>
  `).join('');

  // FAQ
  document.getElementById('faq-tag').textContent = data.faq.tag;
  document.getElementById('faq-title').textContent = data.faq.title;
  document.getElementById('faq-description').textContent = data.faq.description;
  const faqList = document.getElementById('faq-list');
  faqList.innerHTML = data.faq.items.map((item, i) => `
    <div class="faq-item ${i === 0 ? 'open' : ''}">
      <div class="faq-q">${item.question}<span class="faq-icon">+</span></div>
      <div class="faq-a">${item.answer}</div>
    </div>
  `).join('');
  document.querySelectorAll('.faq-q').forEach(q => {
    q.addEventListener('click', () => {
      const item = q.parentElement;
      const wasOpen = item.classList.contains('open');
      document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
      if(!wasOpen) item.classList.add('open');
    });
  });

  // Contacto
  document.getElementById('contacto-title').textContent = data.contacto.title;
  document.getElementById('contacto-description').textContent = data.contacto.description;
  const emailLink = document.getElementById('contacto-email');
  emailLink.href = `mailto:${data.contacto.email}`;
  document.getElementById('contacto-email-text').textContent = data.contacto.email;
  const waLink = document.getElementById('contacto-whatsapp');
  waLink.href = `https://wa.me/${data.contacto.whatsapp_number}?text=${encodeURIComponent(data.contacto.whatsapp_message)}`;
  document.getElementById('contacto-whatsapp-text').textContent = '+54 9 11 2747-3914';
  const igLink = document.getElementById('contacto-instagram');
  igLink.href = data.contacto.instagram_url;
  document.getElementById('contacto-instagram-text').textContent = data.contacto.instagram_handle;

  // Footer
  document.getElementById('footer-copyright').textContent = data.footer.copyright;
}

/* Red de nodos animada para el hero */
const canvas = document.getElementById('network-canvas');
const ctx = canvas.getContext('2d');
let w, h, points;

function resize(){
  w = canvas.width = canvas.offsetWidth;
  h = canvas.height = canvas.offsetHeight;
}

function initPoints(){
  const count = Math.floor((w*h)/18000);
  points = [];
  for(let i=0;i<count;i++){
    points.push({
      x: Math.random()*w,
      y: Math.random()*h,
      vx: (Math.random()-0.5)*0.25,
      vy: (Math.random()-0.5)*0.25
    });
  }
}

function draw(){
  ctx.clearRect(0,0,w,h);
  for(let i=0;i<points.length;i++){
    const p = points[i];
    p.x += p.vx;
    p.y += p.vy;
    if(p.x<0||p.x>w) p.vx*=-1;
    if(p.y<0||p.y>h) p.vy*=-1;
  }
  for(let i=0;i<points.length;i++){
    for(let j=i+1;j<points.length;j++){
      const a = points[i], b = points[j];
      const dx = a.x-b.x, dy = a.y-b.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist<140){
        ctx.strokeStyle = `rgba(16,185,129,${0.5*(1-dist/140)})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.stroke();
      }
    }
  }
  for(let i=0;i<points.length;i++){
    ctx.fillStyle = 'rgba(94,234,212,0.95)';
    ctx.beginPath();
    ctx.arc(points[i].x, points[i].y, 2.6, 0, Math.PI*2);
    ctx.fill();
  }
  requestAnimationFrame(draw);
}

function setup(){
  resize();
  initPoints();
}

window.addEventListener('resize', setup);
setup();
draw();

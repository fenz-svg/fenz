backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "images"
public_folder: "/images"

locale: "es"

collections:
  - name: "contenido"
    label: "Contenido del sitio"
    files:
      - file: "content.json"
        label: "Textos de la página"
        name: "pagina"
        fields:
          - label: "Inicio (Hero)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Etiqueta superior", name: "eyebrow", widget: "string" }
              - { label: "Título (línea 1)", name: "title_line1", widget: "string" }
              - { label: "Título (palabra destacada)", name: "title_highlight", widget: "string" }
              - { label: "Subtítulo", name: "subtitle", widget: "text" }
              - { label: "Botón principal", name: "cta_primary", widget: "string" }
              - { label: "Botón secundario", name: "cta_secondary", widget: "string" }

          - label: "Servicios"
            name: "servicios"
            widget: "object"
            fields:
              - { label: "Etiqueta de sección", name: "tag", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - label: "Servicios"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Número", name: "number", widget: "string" }
                  - { label: "Título", name: "title", widget: "string" }
                  - { label: "Descripción", name: "description", widget: "text" }
                  - { label: "Entrega", name: "delivery", widget: "string" }
                  - { label: "Alcance", name: "scope", widget: "string" }

          - label: "Cómo trabajamos"
            name: "proceso"
            widget: "object"
            fields:
              - { label: "Etiqueta de sección", name: "tag", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - label: "Pasos"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Etiqueta (ej: paso 1)", name: "label", widget: "string" }
                  - { label: "Título", name: "title", widget: "string" }
                  - { label: "Descripción", name: "description", widget: "text" }

          - label: "Precios"
            name: "precios"
            widget: "object"
            fields:
              - { label: "Etiqueta de sección", name: "tag", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - label: "Planes"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Nombre", name: "name", widget: "string" }
                  - { label: "Subtítulo", name: "sub", widget: "string" }
                  - { label: "Precio", name: "price", widget: "string" }
                  - { label: "Período", name: "period", widget: "string" }
                  - { label: "Destacado", name: "featured", widget: "boolean", default: false }
                  - { label: "Etiqueta destacada (ej: Más elegido)", name: "badge", widget: "string", required: false }
                  - label: "Características"
                    name: "features"
                    widget: "list"
                    field: { label: "Característica", name: "feature", widget: "string" }
                  - { label: "Texto del botón", name: "cta", widget: "string" }

          - label: "Preguntas frecuentes"
            name: "faq"
            widget: "object"
            fields:
              - { label: "Etiqueta de sección", name: "tag", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - label: "Preguntas"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Pregunta", name: "question", widget: "string" }
                  - { label: "Respuesta", name: "answer", widget: "text" }

          - label: "Contacto"
            name: "contacto"
            widget: "object"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "WhatsApp (solo números, con código de país)", name: "whatsapp_number", widget: "string" }
              - { label: "Mensaje predeterminado de WhatsApp", name: "whatsapp_message", widget: "string" }
              - { label: "Usuario de Instagram (ej: @usuario)", name: "instagram_handle", widget: "string" }
              - { label: "Link de Instagram", name: "instagram_url", widget: "string" }

          - label: "Pie de página"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Texto de copyright", name: "copyright", widget: "string" }
